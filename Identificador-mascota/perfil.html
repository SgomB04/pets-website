<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mascota</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>
<body>

<div id="perfil"></div>

<script>

const db = supabase.createClient(
  "https://qiuuzdviyapybndfiihs.supabase.co",
  "sb_publishable_uZByT22d0FbsJg4FBouTPw_EMhHFpTC"
);

// Obtener ID de la URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// Cargar datos
async function cargar(){

  const { data } = await db.from("clientes").select("*").eq("id", id).single();

  if(data){
    document.getElementById("perfil").innerHTML = `
      <h2>${data.nombre}</h2>
      <p>📞 ${data.telefono}</p>
      <p>🐶 ${data.mascota}</p>
      ${data.foto ? `<img src="${data.foto}" width="200">` : ""}
    `;
  } else {
    document.getElementById("perfil").innerHTML = "Mascota no encontrada";
  }

}

cargar();

</script>

</body>
</html>
