<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil de Cliente - Pet’s Website</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; text-align: center; padding: 20px; }
  .card { background: #fff; padding: 20px; border-radius: 15px; max-width: 400px; margin: 20px auto; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
  img { width: 200px; border-radius: 10px; margin-top: 10px; }
  h2 { margin-bottom: 10px; }
  p { margin: 5px 0; }
  button { padding:10px 20px; background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
  button:hover { background:#218838; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div id="perfil" class="card">Cargando...</div>

<script>
// 🔥 Reemplaza con tus datos de Supabase
const db = supabase.createClient(
  "https://qiuuzdviyapybndfiihs.supabase.co",
  "sb_publishable_uZByT22d0FbsJg4FBouTPw_EMhHFpTC"
);

// Obtener ID de la URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

console.log("Perfil cargando para ID:", id);

async function cargar() {
  if (!id) {
    document.getElementById("perfil").innerHTML = "ID inválido";
    return;
  }

  try {
    // 🔹 Tabla en minúscula "clientes"
    const { data, error } = await db.from("clientes").select("*").eq("id", id).single();
    if (error) throw error;

    if (data) {
      document.getElementById("perfil").innerHTML = `
        <h2>${data.nombre}</h2>
        <p>🐶 ${data.mascota}</p>
        ${data.foto ? `<img src="${data.foto}" alt="Foto de ${data.mascota}">` : ""}
        ${data.telefono ? `
          <p>
            <a href="tel:${data.telefono}" style="text-decoration:none;">
              <button>Llamar a ${data.nombre}</button>
            </a>
          </p>
        ` : ""}
      `;
    } else {
      document.getElementById("perfil").innerHTML = "Cliente no encontrado";
    }

  } catch (err) {
    console.error("Error cargando cliente:", err);
    document.getElementById("perfil").innerHTML = "Error cargando datos. Revisa la consola.";
  }
}

cargar();
</script>

</body>
</html>
