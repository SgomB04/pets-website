<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil de Mascota</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

/* 🔥 FONDO */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  text-align: center;

  background: 
    linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
    url("fondo.png");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* 🔥 CARD (glass effect) */
.card {
  background: rgba(255, 255, 255, 0.6);
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  margin: 30px auto;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  backdrop-filter: blur(12px);
}

/* 🐶 IMAGEN */
img {
  width: 100%;
  max-width: 250px;
  border-radius: 15px;
  margin-top: 10px;
}

/* TEXTOS */
h2 {
  font-size: 22px;
  margin-bottom: 10px;
}

p {
  font-size: 16px;
  margin: 6px 0;
}

/* BOTONES */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

/* 📞 LLAMAR */
.call-btn {
  background: #28a745;
  color: white;
}

/* 💬 WHATSAPP */
.whatsapp-btn {
  background: #25D366;
  color: white;
}

/* 🆘 SOS */
.sos-btn {
  background: #dc3545;
  color: white;
}

/* 📱 MOBILE */
@media (max-width: 480px) {
  h2 { font-size: 20px; }
  p { font-size: 15px; }
}

</style>

</head>
<body>

<div id="perfil" class="card">Cargando...</div>

<script>

// 🔥 Supabase
const db = supabase.createClient(
  "https://qiuuzdviyapybndfiihs.supabase.co",
  "sb_publishable_uZByT22d0FbsJg4FBouTPw_EMhHFpTC"
);

// 🔍 Obtener ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 📥 CARGAR PERFIL
async function cargar() {
  if (!id) {
    document.getElementById("perfil").innerHTML = "ID inválido";
    return;
  }

  try {
    const { data, error } = await db
      .from("clientes")
      .select("*")
      .eq("id", id)
      .single();

    if (error) throw error;

    if (data) {

      const telefonoLimpio = data.telefono.replace(/\D/g, "");

      // 💬 WhatsApp normal
      const whatsappLink = `https://wa.me/52${telefonoLimpio}`;

      // 🆘 MENSAJE SOS
      const mensajeSOS = encodeURIComponent(
`Hola, encontré a ${data.nombre} 🐾
Raza: ${data.mascota}

Me estoy comunicando desde su identificador para ayudarte a recuperarlo 🙌`
      );

      const sosLink = `https://wa.me/52${telefonoLimpio}?text=${mensajeSOS}`;

      document.getElementById("perfil").innerHTML = `
        <h2>🐾 ${data.nombre}</h2>
        <p>🐶 ${data.mascota}</p>

        ${data.foto ? `<img src="${data.foto}" alt="Foto de ${data.mascota}">` : ""}

        <a href="tel:${data.telefono}" style="text-decoration:none;">
          <button class="call-btn">📞 Llamar</button>
        </a>

        <a href="${whatsappLink}" target="_blank" style="text-decoration:none;">
          <button class="whatsapp-btn">💬 WhatsApp</button>
        </a>

        <a href="${sosLink}" target="_blank" style="text-decoration:none;">
          <button class="sos-btn">🆘 Reportar mascota encontrada</button>
        </a>
      `;

    } else {
      document.getElementById("perfil").innerHTML = "Cliente no encontrado";
    }

  } catch (err) {
    console.error(err);
    document.getElementById("perfil").innerHTML = "Error cargando información";
  }
}

cargar();

</script>

</body>
</html>
